<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Compass">
  <title>Compass</title>
  <defs>
    <linearGradient id="bg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1216" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>
    <linearGradient id="needle-l" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="55%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <filter id="glow-l" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square frame (kept for PWA icons / OS launcher rounding) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg-l)" />

  <!-- North arrow -->
  <g filter="url(#glow-l)">
    <polygon
      points="256,96 312,244 256,264 200,244"
      fill="url(#needle-l)"
    />
  </g>

  <!-- South arrow (outlined) -->
  <polygon
    points="256,416 312,268 256,248 200,268"
    fill="none"
    stroke="#22d3ee"
    stroke-width="10"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Center hub -->
  <circle cx="256" cy="256" r="14" fill="#0e1216" />
</svg>
