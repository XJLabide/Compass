<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Compass mark">
  <title>Compass</title>
  <defs>
    <!-- Subtle north-needle gradient: pale cyan tip → core accent → deeper accent -->
    <linearGradient id="needle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="55%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- North arrow (solid, cyan, glowing). A tall lozenge from 256,48 to 256,256
       with the wide part 1/3 down from the tip. -->
  <g filter="url(#glow)">
    <polygon
      points="256,48 320,232 256,256 192,232"
      fill="url(#needle)"
    />
  </g>

  <!-- South arrow (outline only, thin stroke). Mirror of the north geometry. -->
  <polygon
    points="256,464 320,280 256,256 192,280"
    fill="none"
    stroke="#22d3ee"
    stroke-width="10"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Center hub — single dark disk on top, no extra rings -->
  <circle cx="256" cy="256" r="14" fill="#0a0a0b" />
</svg>
